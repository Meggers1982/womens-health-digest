name: Research Digest

on:
  # Runs every morning at 7:00 AM ET (12:00 UTC)
  schedule:
    - cron: '0 12 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to run (leave blank for all)'
        required: false
        default: ''

jobs:
  # ── Women's Health & Menopause ───────────────────────────────────────────
  digest-womens-health:
    name: "Womens Health & Menopause"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:       ${{ secrets.SERPAPI_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL:   meagan.lea.morris@gmail.com
          CATEGORIES:        "all"
          CHUNK_INDEX:       "1"
          CHUNK_TOTAL:       "1"
          TOPIC_FOCUS:       ""
          FILTER_CATEGORY:   ${{ github.event.inputs.category }}
          DASHBOARD_URL:     ${{ vars.DASHBOARD_URL }}
        run: python scripts/mh_digest.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-womens-health-1
          path: /tmp/results.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Fitness & Sports Medicine ────────────────────────────────────────────
  digest-fitness:
    name: "Fitness & Sports Medicine"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY:       ${{ secrets.SERPAPI_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL:   meagan.lea.morris@gmail.com
          CATEGORIES:        "all"
          CHUNK_INDEX:       "1"
          CHUNK_TOTAL:       "1"
          TOPIC_FOCUS:       ""
          FILTER_CATEGORY:   ${{ github.event.inputs.category }}
          DASHBOARD_URL:     ${{ vars.DASHBOARD_URL }}
        run: python scripts/fitness_digest.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-fitness-1
          path: /tmp/results.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Deploy job: merge artifacts → data/results.json → GitHub Pages ───────
  deploy:
    name: "Merge & deploy dashboard"
    runs-on: ubuntu-latest
    needs: [digest-womens-health, digest-fitness]
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: /tmp/artifacts

      - name: List downloaded artifacts
        run: find /tmp/artifacts -name "*.json" | sort

      - name: Merge results and send digest email
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: meagan.lea.morris@gmail.com
          DASHBOARD_URL:   ${{ vars.DASHBOARD_URL }}
        run: python scripts/merge_results.py

      - name: Commit and push updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update research digest results [skip ci]"
            git push
          fi
